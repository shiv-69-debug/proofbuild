name: Publish Filecoin Demo Receipt

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node dist/cli.js snapshot --no-build --publish --network calibration --ai-log AI_BUILD_LOG.md --notes "Public FilecoinTLDR challenge demo"
        env:
          PROOFBUILD_PRIVATE_KEY: ${{ secrets.PROOFBUILD_PRIVATE_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: proofbuild-filecoin-receipt
          path: .proofbuild/receipts/
